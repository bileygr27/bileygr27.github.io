<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUAT YUPIII</title>
  <!-- Google Fonts Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,700;1,900&display=swap" rel="stylesheet">
  
  <style>
    /* === RESET STYLE & UMUM === */
    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    :root {
      --dark-color: #000;
      --accent-glow: #39c6d6;
    }

    body {
      background-color: var(--dark-color);
      color: azure;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      perspective: 1000px;
    }

    /* === SCREEN 1: BERANDA / GREETINGS === */
    #greetings-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      max-width: 600px;
      padding: 20px;
      z-index: 10;
      transition: opacity 1s ease, transform 1s ease;
    }

    .greetings {
      font-size: 5rem;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .greetings > span {
      animation: glow 2.5s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes glow {
      0%, 100% {
        color: #fff;
        text-shadow: 0 0 12px var(--accent-glow), 0 0 50px var(--accent-glow), 0 0 100px var(--accent-glow);
      }
      10%, 90% {
        color: #111;
        text-shadow: none;
      }
    }

    /* Efek delay per huruf agar berkedip bergantian */
    .greetings > span:nth-child(1) { animation-delay: 0s; }
    .greetings > span:nth-child(2) { animation-delay: .2s; }
    .greetings > span:nth-child(3) { animation-delay: .4s; }
    .greetings > span:nth-child(4) { animation-delay: .6s; }
    .greetings > span:nth-child(5) { animation-delay: .8s; }

    .description {
      font-size: 1.4rem;
      margin-bottom: 30px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .button-gift {
      background: linear-gradient(135deg, #1aaa15 0%, #079097 100%);
      border: none;
      color: white;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(57, 198, 214, 0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .button-gift:hover {
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 0 25px rgba(57, 198, 214, 0.7);
      background: linear-gradient(135deg, #23f0ff 0%, #1aaa15 100%);
    }

    .button-gift:active {
      transform: scale(0.95);
    }

    /* === SCREEN 2: BUNGA MEKAR (AWALNYA TERSEMBUNYI) === */
    #flower-screen {
      display: none; /* Akan diset menjadi flex oleh JS */
      opacity: 0;
      width: 100%;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      align-items: flex-end;
      justify-content: center;
      transition: opacity 1.5s ease;
    }

    /* === GAYA VISUAL BUNGA (DARI SCSS/CSS UTAMA ANDA) === */
    .night {
      position: fixed;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      filter: blur(0.1vmin);
      background-image: 
        radial-gradient(ellipse at top, transparent 0%, var(--dark-color)), 
        radial-gradient(ellipse at bottom, var(--dark-color), rgba(145, 233, 255, 0.2)), 
        repeating-linear-gradient(220deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px), 
        repeating-linear-gradient(189deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px), 
        repeating-linear-gradient(148deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px), 
        linear-gradient(90deg, rgb(0, 255, 250), rgb(240, 240, 240));
      z-index: 1;
    }

    .flowers {
      position: relative;
      transform: scale(0.85);
      z-index: 5;
      margin-bottom: 8vh;
      transition: transform 0.5s ease;
    }

    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: 0.8s;
    }

    .flower--1 {
      animation: moving-flower-1 4s linear infinite;
    }
    .flower--1 .flower__line {
      height: 70vmin;
      animation-delay: 0.3s;
    }
    .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
    .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.2s backwards; }
    .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1s backwards; }
    .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left var(--fl-speed) 2s backwards; }

    .flower--2 {
      left: 50%;
      transform: rotate(20deg);
      animation: moving-flower-2 4s linear infinite;
    }
    .flower--2 .flower__line {
      height: 60vmin;
      animation-delay: 0.6s;
    }
    .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
    .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
    .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.5s backwards; }
    .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.3s backwards; }

    .flower--3 {
      left: 50%;
      transform: rotate(-15deg);
      animation: moving-flower-3 4s linear infinite;
    }
    .flower--3 .flower__line {
      animation-delay: 0.9s;
    }
    .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
    .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
    .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.1s backwards; }
    .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.9s backwards; }

    .flower__leafs {
      position: relative;
      animation: blooming-flower 2s backwards;
    }
    .flower__leafs--1 { animation-delay: 1.1s; }
    .flower__leafs--2 { animation-delay: 1.4s; }
    .flower__leafs--3 { animation-delay: 1.7s; }

    .flower__leafs::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -100%);
      width: 8vmin;
      height: 8vmin;
      background-color: #6bf0ff;
      filter: blur(10vmin);
    }

    .flower__leaf {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 8vmin;
      height: 11vmin;
      border-radius: 51% 49% 47% 53%/44% 45% 55% 69%;
      background-color: #a7ffee;
      background-image: linear-gradient(to top, #54b8aa, #a7ffee);
      transform-origin: bottom center;
      opacity: 0.9;
      box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5);
    }

    .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
    .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4 {
      width: 8vmin;
      height: 8vmin;
      transform-origin: bottom left;
      border-radius: 4vmin 10vmin 4vmin 4vmin;
      transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg);
      background-image: linear-gradient(to top, #39c6d6, #a7ffee);
      z-index: 1;
      opacity: 0.8;
    }

    .flower__white-circle {
      position: absolute;
      left: -3.5vmin;
      top: -3vmin;
      width: 9vmin;
      height: 4vmin;
      border-radius: 50%;
      background-color: #fff;
    }

    .flower__white-circle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 60%;
      border-radius: inherit;
      background-image: 
        repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), 
        repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), 
        linear-gradient(90deg, rgb(255, 235, 18), rgb(255, 206, 0));
    }

    .flower__line {
      height: 55vmin;
      width: 1.5vmin;
      background-image: 
        linear-gradient(to left, rgba(0, 0, 0, 0.2), transparent, rgba(255, 255, 255, 0.2)), 
        linear-gradient(to top, transparent 10%, #14757a, #39c6d6);
      box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5);
      animation: grow-flower-tree 4s backwards;
    }

    .flower__line__leaf {
      --w: 7vmin;
      --h: calc(var(--w) + 2vmin);
      position: absolute;
      top: 20%;
      left: 90%;
      width: var(--w);
      height: var(--h);
      border-top-right-radius: var(--h);
      border-bottom-left-radius: var(--h);
      background-image: linear-gradient(to top, rgba(20, 117, 122, 0.4), #39c6d6);
    }

    .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3, .flower__line__leaf--4, .flower__line__leaf--6 {
      border-top-right-radius: 0;
      border-bottom-left-radius: 0;
      border-top-left-radius: var(--h);
      border-bottom-right-radius: var(--h);
      left: -460%;
      top: 12%;
      transform: rotate(-70deg) rotateY(30deg);
    }
    .flower__line__leaf--4 { top: 40%; }
    .flower__line__leaf--5 {
      top: 0;
      transform-origin: left;
      transform: rotate(70deg) rotateY(30deg) scale(0.6);
    }
    .flower__line__leaf--6 {
      top: -2%;
      left: -450%;
      transform-origin: right;
      transform: rotate(-70deg) rotateY(30deg) scale(0.6);
    }

    .flower__light {
      position: absolute;
      bottom: 0vmin;
      width: 1vmin;
      height: 1vmin;
      background-color: rgb(255, 251, 0);
      border-radius: 50%;
      filter: blur(0.2vmin);
      animation: light-ans 4s linear infinite backwards;
    }

    .flower__light:nth-child(odd) {
      background-color: #23f0ff;
    }

    .flower__light--1 { left: -2vmin; animation-delay: 1s; }
    .flower__light--2 { left: 3vmin; animation-delay: 0.5s; }
    .flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
    .flower__light--4 { left: 6vmin; animation-delay: 0.9s; }
    .flower__light--5 { left: -1vmin; animation-delay: 1.5s; }
    .flower__light--6 { left: -4vmin; animation-delay: 3s; }
    .flower__light--7 { left: 3vmin; animation-delay: 2s; }
    .flower__light--8 { left: -6vmin; animation-delay: 3.5s; }

    /* Rerumputan & Daun Luar */
    .flower__grass {
      --c: #159faa;
      --line-w: 1.5vmin;
      position: absolute;
      bottom: 12vmin;
      left: -7vmin;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      z-index: 20;
      transform-origin: bottom center;
      transform: rotate(-48deg) rotateY(40deg);
    }

    .flower__grass--1 {
      animation: moving-grass 2s linear infinite;
    }

    .flower__grass--2 {
      left: 2vmin;
      bottom: 10vmin;
      transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
      opacity: 0.8;
      z-index: 0;
      animation: moving-grass--2 1.5s linear infinite;
    }

    .flower__grass--top {
      width: 7vmin;
      height: 10vmin;
      border-top-right-radius: 100%;
      border-right: var(--line-w) solid var(--c);
      transform-origin: bottom center;
      transform: rotate(-2deg);
    }

    .flower__grass--bottom {
      margin-top: -2px;
      width: var(--line-w);
      height: 25vmin;
      background-image: linear-gradient(to top, transparent, var(--c));
    }

    .flower__grass__leaf {
      --size: 10vmin;
      position: absolute;
      width: calc(var(--size) * 2.1);
      height: var(--size);
      border-top-left-radius: var(--size);
      border-top-right-radius: var(--size);
      background-image: linear-gradient(to top, transparent, transparent 30%, var(--c));
      z-index: 100;
    }

    /* Animasi Pertumbuhan Daun */
    .flower__grass__leaf--1 { top: -6%; left: 30%; --size: 6vmin; transform: rotate(-20deg); animation: growing-grass-ans--1 2s 2.6s backwards; }
    @keyframes growing-grass-ans--1 {
      0% { transform-origin: bottom left; transform: rotate(-20deg) scale(0); }
    }
    .flower__grass__leaf--2 { top: -5%; left: -110%; --size: 6vmin; transform: rotate(10deg); animation: growing-grass-ans--2 2s 2.4s linear backwards; }
    @keyframes growing-grass-ans--2 {
      0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); }
    }
    .flower__grass__leaf--3 { top: 5%; left: 60%; --size: 8vmin; transform: rotate(-18deg) rotateX(-20deg); animation: growing-grass-ans--3 2s 2.2s linear backwards; }
    @keyframes growing-grass-ans--3 {
      0% { transform-origin: bottom left; transform: rotate(-18deg) rotateX(-20deg) scale(0); }
    }
    .flower__grass__leaf--4 { top: 6%; left: -135%; --size: 8vmin; transform: rotate(2deg); animation: growing-grass-ans--4 2s 2s linear backwards; }
    @keyframes growing-grass-ans--4 {
      0% { transform-origin: bottom right; transform: rotate(2deg) scale(0); }
    }
    .flower__grass__leaf--5 { top: 20%; left: 60%; --size: 10vmin; transform: rotate(-24deg) rotateX(-20deg); animation: growing-grass-ans--5 2s 1.8s linear backwards; }
    @keyframes growing-grass-ans--5 {
      0% { transform-origin: bottom left; transform: rotate(-24deg) rotateX(-20deg) scale(0); }
    }
    .flower__grass__leaf--6 { top: 22%; left: -180%; --size: 10vmin; transform: rotate(10deg); animation: growing-grass-ans--6 2s 1.6s linear backwards; }
    @keyframes growing-grass-ans--6 {
      0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); }
    }
    .flower__grass__leaf--7 { top: 39%; left: 70%; --size: 10vmin; transform: rotate(-10deg); animation: growing-grass-ans--7 2s 1.4s linear backwards; }
    @keyframes growing-grass-ans--7 {
      0% { transform-origin: bottom left; transform: rotate(-10deg) scale(0); }
    }
    .flower__grass__leaf--8 { top: 40%; left: -215%; --size: 11vmin; transform: rotate(10deg); animation: growing-grass-ans--8 2s 1.2s linear backwards; }
    @keyframes growing-grass-ans--8 {
      0% { transform-origin: bottom right; transform: rotate(10deg) scale(0); }
    }

    .flower__grass__overlay {
      position: absolute;
      top: -10%;
      right: 0%;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      filter: blur(1.5vmin);
      z-index: 100;
    }

    /* Daun Samping Melengkung */
    .flower__g-long {
      --w: 2vmin;
      --h: 6vmin;
      --c: #159faa;
      position: absolute;
      bottom: 10vmin;
      left: -3vmin;
      transform-origin: bottom center;
      transform: rotate(-30deg) rotateY(-20deg);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      animation: flower-g-long-ans 3s linear infinite;
    }

    @keyframes flower-g-long-ans {
      0%, 100% { transform: rotate(-30deg) rotateY(-20deg); }
      50% { transform: rotate(-32deg) rotateY(-20deg); }
    }

    .flower__g-long__top {
      top: calc(var(--h) * -1);
      width: calc(var(--w) + 1vmin);
      height: var(--h);
      border-top-right-radius: 100%;
      border-right: 0.7vmin solid var(--c);
      transform: translate(-0.7vmin, 1vmin);
    }

    .flower__g-long__bottom {
      width: var(--w);
      height: 50vmin;
      transform-origin: bottom center;
      background-image: linear-gradient(to top, transparent 30%, var(--c));
      box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5);
      clip-path: polygon(35% 0, 65% 1%, 100% 100%, 0% 100%);
    }

    .flower__g-right {
      position: absolute;
      bottom: 6vmin;
      left: -2vmin;
      transform-origin: bottom left;
      transform: rotate(20deg);
    }

    .flower__g-right .leaf {
      width: 30vmin;
      height: 50vmin;
      border-top-left-radius: 100%;
      border-left: 2vmin solid #079097;
      background-image: linear-gradient(to bottom, transparent, var(--dark-color) 60%);
      -webkit-mask-image: linear-gradient(to top, transparent 30%, #079097 60%);
      mask-image: linear-gradient(to top, transparent 30%, #079097 60%);
    }

    .flower__g-right--1 { animation: flower-g-right-ans 2.5s linear infinite; }
    .flower__g-right--2 {
      left: 5vmin;
      transform: rotateY(-180deg);
      animation: flower-g-right-ans--2 3s linear infinite;
    }
    .flower__g-right--2 .leaf {
      height: 75vmin;
      filter: blur(0.3vmin);
      opacity: 0.8;
    }

    @keyframes flower-g-right-ans {
      0%, 100% { transform: rotate(20deg); }
      50% { transform: rotate(24deg) rotateX(-20deg); }
    }
    @keyframes flower-g-right-ans--2 {
      0%, 100% { transform: rotateY(-180deg) rotate(0deg) rotateX(-20deg); }
      50% { transform: rotateY(-180deg) rotate(6deg) rotateX(-20deg); }
    }

    /* Daun Kecil Depan */
    .flower__g-front {
      position: absolute;
      bottom: 6vmin;
      left: 2.5vmin;
      z-index: 100;
      transform-origin: bottom center;
      transform: rotate(-28deg) rotateY(30deg) scale(1.04);
      animation: flower__g-front-ans 2s linear infinite;
    }

    @keyframes flower__g-front-ans {
      0%, 100% { transform: rotate(-28deg) rotateY(30deg) scale(1.04); }
      50% { transform: rotate(-35deg) rotateY(40deg) scale(1.04); }
    }

    .flower__g-front__line {
      width: 0.3vmin;
      height: 20vmin;
      background-image: linear-gradient(to top, transparent, #079097, transparent 100%);
      position: relative;
    }

    .flower__g-front__leaf-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: bottom left;
      transform: rotate(10deg);
    }
    .flower__g-front__leaf-wrapper:nth-child(even) {
      left: 0vmin;
      transform: rotateY(-180deg) rotate(5deg);
      animation: flower__g-front__leaf-left-ans 1s ease-in backwards;
    }
    .flower__g-front__leaf-wrapper:nth-child(odd) {
      animation: flower__g-front__leaf-ans 1s ease-in backwards;
    }
    .flower__g-front__leaf-wrapper--1 {
      top: -8vmin;
      transform: scale(0.7);
      animation: flower__g-front__leaf-ans 1s 5.5s ease-in backwards !important;
    }
    .flower__g-front__leaf-wrapper--2 {
      top: -8vmin;
      transform: rotateY(-180deg) scale(0.7) !important;
      animation: flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important;
    }
    .flower__g-front__leaf-wrapper--3 {
      top: -3vmin;
      animation: flower__g-front__leaf-ans 1s 4.6s ease-in backwards;
    }
    .flower__g-front__leaf-wrapper--4 {
      top: -3vmin;
      transform: rotateY(-180deg) scale(0.9) !important;
      animation: flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important;
    }

    @keyframes flower__g-front__leaf-left-ans-2 {
      0% { transform: rotateY(-180deg) scale(0); }
    }

    .flower__g-front__leaf-wrapper--5, .flower__g-front__leaf-wrapper--6 { top: 2vmin; }
    .flower__g-front__leaf-wrapper--7, .flower__g-front__leaf-wrapper--8 { top: 6.5vmin; }

    .flower__g-front__leaf-wrapper--2 { animation-delay: 5.2s !important; }
    .flower__g-front__leaf-wrapper--3 { animation-delay: 4.9s !important; }
    .flower__g-front__leaf-wrapper--5 { animation-delay: 4.3s !important; }
    .flower__g-front__leaf-wrapper--6 { animation-delay: 4.1s !important; }
    .flower__g-front__leaf-wrapper--7 { animation-delay: 3.8s !important; }
    .flower__g-front__leaf-wrapper--8 { animation-delay: 3.5s !important; }

    @keyframes flower__g-front__leaf-ans {
      0% { transform: rotate(10deg) scale(0); }
    }
    @keyframes flower__g-front__leaf-left-ans {
      0% { transform: rotateY(-180deg) rotate(5deg) scale(0); }
    }

    .flower__g-front__leaf {
      width: 10vmin;
      height: 10vmin;
      border-radius: 100% 0% 0% 100%/100% 100% 0% 0%;
      box-shadow: inset 0 2px 1vmin hsla(184, 97%, 58%, 0.2);
      background-image: 
        linear-gradient(to bottom left, transparent, var(--dark-color)), 
        linear-gradient(to bottom right, #159faa 50%, transparent 50%, transparent);
      -webkit-mask-image: linear-gradient(to bottom right, #159faa 50%, transparent 50%, transparent);
      mask-image: linear-gradient(to bottom right, #159faa 50%, transparent 50%, transparent);
    }

    .flower__g-fr {
      position: absolute;
      bottom: -4vmin;
      left: 0;
      transform-origin: bottom left;
      z-index: 10;
      animation: flower__g-fr-ans 2s linear infinite;
    }

    @keyframes flower__g-fr-ans {
      0%, 100% { transform: rotate(2deg); }
      50% { transform: rotate(4deg); }
    }

    .flower__g-fr .leaf {
      width: 30vmin;
      height: 50vmin;
      border-top-left-radius: 100%;
      border-left: 2vmin solid #079097;
      -webkit-mask-image: linear-gradient(to top, transparent 25%, #079097 50%);
      mask-image: linear-gradient(to top, transparent 25%, #079097 50%);
      position: relative;
      z-index: 1;
    }

    .flower__g-fr__leaf {

    function revealGift() {
      const greetScreen = document.getElementById('greetings-screen');
      const flowerScreen = document.getElementById('flower-screen');
      const audioPanel = document.getElementById('audio-panel');

      // Memulai Audio API pertama kali agar tidak diblokir browser
      initAudio();

      // Animasi transisi menghilang pada Layar Beranda
      greetScreen.style.opacity = '0';
      greetScreen.style.transform = 'scale(0.9) translateY(-20px)';

      setTimeout(() => {
        greetScreen.style.display = 'none';
        
        // Memunculkan Layar Bunga Mekar
        flowerScreen.style.display = 'flex';
        audioPanel.style.display = 'flex';
        
        // Memulai penggambaran efek ketukan di kanvas
        initCanvas();

        setTimeout(() => {
          flowerScreen.style.opacity = '1';
          document.body.classList.remove("not-loaded");
          
          // Bunyi denting magis pembuka
          playMelodicArpeggio();
          
          // Mengaktifkan loop melodi romantis secara otomatis
          toggleMusic(true);
        }, 100);
      }, 800);
    }

    // === EFEK SENTUHAN KUNANG-KUNANG & BUNGA (KANVAS) ===
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('click', handleUserInteraction);
      window.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        handleUserInteraction({ clientX: touch.clientX, clientY: touch.clientY, target: e.target });
      });
      requestAnimationFrame(updateParticles);
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class MagicalSpark {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 5 + 3;
        this.speedX = Math.random() * 3 - 1.5;
        this.speedY = -(Math.random() * 3 + 2);
        this.opacity = 1;
        // Gradasi warna cyan bercahaya dan emas magis
        this.color = Math.random() > 0.5 ? 'rgba(57, 198, 214,' : 'rgba(255, 235, 18,';
        this.decay = Math.random() * 0.015 + 0.01;
      }

      update() {
        this.x += this.speedX + Math.sin(this.y / 15) * 0.5;
        this.y += this.speedY;
        this.opacity -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.shadowBlur = this.size * 2;
        ctx.shadowColor = this.color.includes('57') ? '#39c6d6' : '#ffeb12';
        ctx.fillStyle = this.color + this.opacity + ')';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function handleUserInteraction(e) {
      if (e.target && e.target.closest('.audio-panel')) return;

      // Suara denting harmonis acak saat menyentuh layar
      triggerRandomSparkTone();

      // Memunculkan partikel kunang-kunang di posisi sentuhan
      const x = e.clientX || window.innerWidth / 2;
      const y = e.clientY || window.innerHeight / 2;
      for (let i = 0; i < 10; i++) {
        particles.push(new MagicalSpark(x, y));
      }
    }

    function updateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].opacity <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(updateParticles);
    }


    // === AUDIO ENGINE (SINTESIS NYATA TANPA FILE MP3 EKSTERNAL) ===
    let audioCtx = null;
    let musicInterval = null;
    let isMusicPlaying = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playTone(freq, type, duration, volume) {
      if (!audioCtx) return;
      
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

      // Desain akustik filter lowpass agar terdengar lembut di telinga
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1400, audioCtx.currentTime);

      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

      osc.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // Melodi pembuka kado romantis
    function playMelodicArpeggio() {
      const arp = [523.25, 659.25, 783.99, 987.77, 1046.50]; // Nada C5, E5, G5, B5, C6 (Arpeggio Major 7)
      arp.forEach((freq, index) => {
        setTimeout(() => {
          playTone(freq, 'sine', 1.5, 0.12);
        }, index * 120);
      });
    }

    // Nada unik saat layar diketuk
    function triggerRandomSparkTone() {
      const romanticNotes = [329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99]; // Nada romantis melodi
      const randomFreq = romanticNotes[Math.floor(Math.random() * romanticNotes.length)];
      playTone(randomFreq, 'sine', 1.0, 0.08);
    }

    // Kontrol memutar / memberhentikan musik ambient otomatis
    function toggleMusic(forceState) {
      initAudio();
      const btn = document.getElementById('synth-btn');
      
      // Jika diset paksa atau ditoggle
      const nextState = forceState !== undefined ? forceState : !isMusicPlaying;

      if (nextState) {
        isMusicPlaying = true;
        btn.innerHTML = "NONAKTIFKAN";
        btn.style.background = "#1aaa15";
        btn.style.color = "white";

        // Memulai Loop Melodi Indah Bertema Musik Lullaby Magis
        let step = 0;
        const melody = [
          523.25, 659.25, 587.33, 783.99, // C5, E5, D5, G5
          659.25, 880.00, 783.99, 987.77, // E5, A5, G5, B5
          1046.50, 783.99, 880.00, 659.25, // C6, G5, A5, E5
          587.33, 523.25, 587.33, 392.00  // D5, C5, D5, G4
        ];

        musicInterval = setInterval(() => {
          const freq = melody[step % melody.length];
          // Mainkan melodi utama
          playTone(freq, 'sine', 1.2, 0.07);

          // Pad pengiring dasar chord hangat (setiap 2 ketukan)
          if (step % 2 === 0) {
            const chords = [261.63, 329.63, 392.00, 196.00]; // Pad harmoni hangat
            playTone(chords[Math.floor(step / 4) % chords.length], 'triangle', 2.0, 0.04);
          }
          
          step++;
        }, 800);
      } else {
        isMusicPlaying = false;
        btn.innerHTML = "AKTIFKAN";
        btn.style.background = "var(--accent-glow)";
        btn.style.color = "black";
        clearInterval(musicInterval);
      }
    }
  </script>
</body>
