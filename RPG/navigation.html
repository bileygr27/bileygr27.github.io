<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navigasi Kuantum - Nusantara Odyssey</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020208; font-family: 'Orbitron', sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #00f0ff; }
        .stat { font-size: 16px; margin-bottom: 8px; color: #00f0ff; }
        
        #gameOverOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #gameOverOverlay h1 { color: #ff4500; font-size: 48px; margin-bottom: 20px; }
        #gameOverOverlay button { padding: 15px 30px; font-size: 20px; background: #00f0ff; border: none; cursor: pointer; border-radius: 5px; font-family: 'Orbitron'; }

        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .btn-ctrl { width: 70px; height: 70px; background: rgba(0, 240, 255, 0.2); border: 2px solid #00f0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; user-select: none; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="stat" id="hpDisplay">HP: 100%</div>
        <div class="stat" id="distDisplay">Jarak: 0%</div>
        <div class="stat" id="targetDisplay">Tujuan: -</div>
    </div>

    <div id="gameOverOverlay">
        <h1>KAPAL HANCUR!</h1>
        <button onclick="window.location.href='pesawat.html'">Kembali ke Orbit</button>
    </div>

    <div class="controls">
        <div class="btn-ctrl" id="btnLeft">◀</div>
        <div class="btn-ctrl" id="btnRight">▶</div>
    </div>

    <audio id="bgMusic" loop src="musik2.mp3"></audio>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');
        const targetPlanet = localStorage.getItem('targetPlanet') || 'planet-jawa/game.html';
        
        function startMusic() {
            bgMusic.play().catch(e => console.log("Menunggu interaksi pengguna"));
            window.removeEventListener('pointerdown', startMusic);
        }
        window.addEventListener('pointerdown', startMusic);

        let player = { x: 0, y: 0, w: 45, h: 55, hp: 100, alpha: 1, vx: 0 };
        let meteors = [];
        let progress = 0;
        let gameActive = true;
        let planetObj = { x: 0, y: -300, r: 80, visible: false };

        function showGameOver() {
            gameActive = false;
            document.getElementById('gameOverOverlay').style.display = 'flex';
            bgMusic.pause();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width / 2 - 22;
            player.y = canvas.height - 120;
        }
        window.onresize = resize;
        resize();

        const keys = { ArrowLeft: false, ArrowRight: false };
        window.onkeydown = (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; };
        window.onkeyup = (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; };

        const btnL = document.getElementById('btnLeft');
        const btnR = document.getElementById('btnRight');
        btnL.onpointerdown = () => { keys.ArrowLeft = true; startMusic(); };
        btnL.onpointerup = () => keys.ArrowLeft = false;
        btnR.onpointerdown = () => { keys.ArrowRight = true; startMusic(); };
        btnR.onpointerup = () => keys.ArrowRight = false;

        function update() {
            if (!gameActive) return;

            if (keys.ArrowLeft) player.vx -= 0.8;
            else if (keys.ArrowRight) player.vx += 0.8;
            else player.vx *= 0.75; 

            player.vx = Math.max(-6, Math.min(6, player.vx));
            player.x += player.vx;

            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x > canvas.width - player.w) { player.x = canvas.width - player.w; player.vx = 0; }

            progress += 0.06;
            document.getElementById('distDisplay').innerText = `Jarak: ${Math.min(100, Math.floor(progress))}%`;

            if (progress < 97) {
                if (Math.random() < 0.09) {
                    meteors.push({ x: Math.random() * canvas.width, y: -50, r: Math.random() * 20 + 10, speed: Math.random() * 5 + 4 });
                }
            }

            meteors.forEach((m, index) => {
                m.y += m.speed;
                if (m.y > canvas.height) meteors.splice(index, 1);
                
                let dx = (player.x + player.w/2) - m.x;
                let dy = (player.y + player.h/2) - m.y;
                if (Math.sqrt(dx*dx + dy*dy) < m.r + 15) {
                    player.hp -= 12;
                    meteors.splice(index, 1);
                    document.getElementById('hpDisplay').innerText = `HP: ${player.hp}%`;
                    if (player.hp <= 0) {
                        player.hp = 0;
                        document.getElementById('hpDisplay').innerText = "HP: 0%";
                        showGameOver();
                    }
                }
            });

            if (progress >= 97) {
                planetObj.visible = true;
                planetObj.x = canvas.width / 2;
                planetObj.y += 1.5;
                if (Math.abs(player.x - (planetObj.x - 22)) > 2) player.x += (planetObj.x - 22 - player.x) * 0.05;
                if (planetObj.y > canvas.height / 2 - 50) {
                    player.alpha -= 0.02;
                    if (player.alpha <= 0) window.location.href = targetPlanet;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            for(let i=0; i<30; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1.2, 1.2);

            ctx.globalAlpha = player.alpha;
            
            // Menggambar Pesawat Luar Angkasa Baru
            ctx.fillStyle = '#cccccc'; // Bodi utama
            ctx.beginPath();
            ctx.moveTo(player.x + 22, player.y);      // Ujung depan
            ctx.lineTo(player.x + 45, player.y + 40);  // Sayap kanan
            ctx.lineTo(player.x + 22, player.y + 30);  // Bagian tengah belakang
            ctx.lineTo(player.x, player.y + 40);      // Sayap kiri
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#00f0ff'; // Kokpit
            ctx.beginPath();
            ctx.ellipse(player.x + 22, player.y + 15, 6, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ff4500'; // Mesin (api kecil)
            ctx.fillRect(player.x + 18, player.y + 35, 8, 8);

            ctx.globalAlpha = 1;
            ctx.fillStyle = '#ff4500';
            meteors.forEach(m => {
                ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
            });

            if (planetObj.visible) {
                ctx.fillStyle = '#4fc3f7';
                ctx.beginPath(); ctx.arc(planetObj.x, planetObj.y, planetObj.r, 0, Math.PI*2); ctx.fill();
            }
            requestAnimationFrame(() => { update(); draw(); });
        }

        document.getElementById('targetDisplay').innerText = `Tujuan: ${targetPlanet.split('/')[0]}`;
        draw();
    </script>
</body>
</html>
